substitutions:
  _REGION: asia-southeast1
  _REPOSITORY: navibot
  _IMAGE: backend
  _SERVICE: navibot-backend
  _NAVIBOT_WEB_ORIGIN: "*"

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --min-instances
      - "0"
      - --max-instances
      - "2"
      - --timeout
      - "3600"
      - --set-env-vars
      - NAVIBOT_WEB_ORIGIN=${_NAVIBOT_WEB_ORIGIN}
      - --set-secrets
      - NAVIBOT_ROBOT_TOKEN=navibot-robot-token:latest,NAVIBOT_OPERATOR_TOKEN=navibot-operator-token:latest,DATABASE_URL=navibot-database-url:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:latest
