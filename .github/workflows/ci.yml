name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: pytest

  node:
    name: Bun typecheck and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Build
        run: bun run build

  backend-image:
    name: Backend Docker image
    runs-on: ubuntu-latest
    needs:
      - node
    steps:
      - uses: actions/checkout@v4
      - name: Build backend container
        run: docker build -f apps/backend/Dockerfile -t navibot-backend:test .
